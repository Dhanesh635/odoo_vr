services:
  backend:
    build: .
    container_name: transitops-backend

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      MONGODB_URI: mongodb://mongo:27017/transitops

    depends_on:
      - mongo

    command: npm run start:dev

  mongo:
    image: mongo:8

    container_name: transitops-mongo

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: